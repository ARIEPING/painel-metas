<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel de Metas</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 30px;
      color: #222;
    }

    .container {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    .data {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
    }

    .card {
      margin-bottom: 30px;
      padding: 24px;
      border-radius: 14px;
      background: #f9fafb;
    }

    .titulo {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .percentual {
      font-size: 42px;
      font-weight: bold;
      margin-bottom: 12px;
      color: #2563eb;
    }

    .barra {
      width: 100%;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      height: 22px;
    }

    .progresso {
      height: 100%;
      background: #22c55e;
      border-radius: 999px;
    }

    .texto {
      margin-top: 12px;
      font-size: 18px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>📊 Painel de Metas da Operação</h1>

    <div class="data">
      Atualizado em: 02/07/2026 às 14:30
    </div>

    <div class="card">
      <div class="titulo">🎯 Meta Mensal</div>
      <div class="percentual">50%</div>
      <div class="barra">
        <div class="progresso" style="width: 50%;"></div>
      </div>
      <div class="texto">Até o momento estamos com 50% da meta mensal concluída.</div>
    </div>

    <div class="card">
      <div class="titulo">📈 Meta Trimestral</div>
      <div class="percentual">33%</div>
      <div class="barra">
        <div class="progresso" style="width: 33%;"></div>
      </div>
      <div class="texto">No trimestre estamos com 33% da meta concluída.</div>
    </div>
  </div>
</body>
</html>

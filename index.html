<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Metas</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", Arial, sans-serif;
  background: #f4f7fb;
  color: #222;
}

.container {
  max-width: 980px;
  margin: 40px auto;
  padding: 20px;
}

.header {
  background: white;
  border-radius: 10px;
  box-shadow: 0 4px 18px rgba(80,150,210,.25);
  overflow: hidden;
  margin-bottom: 24px;
}

.header-title {
  background: #d9ecfb;
  color: #4f8fc4;
  font-size: 24px;
  font-weight: 600;
  padding: 10px 16px;
}

.header-body {
  padding: 18px;
  text-align: center;
  font-size: 18px;
}

.cards {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 24px;
}

.card {
  background: white;
  border-radius: 10px;
  box-shadow: 0 4px 18px rgba(80,150,210,.28);
  overflow: hidden;
}

.card-title {
  background: #d9ecfb;
  color: #4f8fc4;
  font-size: 22px;
  font-weight: 600;
  padding: 8px 14px;
}

.card-body {
  padding: 34px 24px;
  text-align: center;
}

.percentual {
  font-size: 52px;
  font-weight: 700;
  margin-bottom: 28px;
}

.barra {
  height: 18px;
  background: #e5e7eb;
  border-radius: 999px;
  overflow: hidden;
}

.progresso {
  height: 100%;
  border-radius: 999px;
  background: #2c9bd3;
}

.status {
  margin-top: 16px;
  font-size: 18px;
  color: #00b050;
  font-weight: 600;
}

@media (max-width: 700px) {
  .cards {
    grid-template-columns: 1fr;
  }

  .percentual {
    font-size: 44px;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="header-title">Painel de Metas da Operação</div>
    <div class="header-body" id="data"></div>
  </div>

  <div class="cards">

    <div class="card">
      <div class="card-title">Meta Mensal</div>
      <div class="card-body">
        <div class="percentual" id="mensal"></div>
        <div class="barra">
          <div class="progresso" id="barraMensal"></div>
        </div>
        <div class="status">Meta realizada</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Meta Trimestral</div>
      <div class="card-body">
        <div class="percentual" id="trimestral"></div>
        <div class="barra">
          <div class="progresso" id="barraTrimestral"></div>
        </div>
        <div class="status">Meta realizada</div>
      </div>
    </div>

  </div>
</div>

<script>
function formatarPercentual(valor) {
  return Number(valor).toLocaleString("pt-BR", {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  }) + "%";
}

function limitar(valor) {
  return Math.min(Number(valor), 100);
}

fetch("dados.json")
  .then(res => res.json())
  .then(dados => {
    const mensal = dados.metaMensal;
    const trimestral = dados.metaTrimestral;

    document.getElementById("mensal").innerHTML = formatarPercentual(mensal);
    document.getElementById("trimestral").innerHTML = formatarPercentual(trimestral);

    document.getElementById("barraMensal").style.width = limitar(mensal) + "%";
    document.getElementById("barraTrimestral").style.width = limitar(trimestral) + "%";

    const agora = new Date();
    document.getElementById("data").innerHTML =
      "Atualizado em: " + agora.toLocaleString("pt-BR", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
  });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Metas</title>

<style>
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f6f9;
}

.container{
    max-width:700px;
    margin:40px auto;
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    margin-bottom:5px;
}

.data{
    text-align:center;
    color:#777;
    margin-bottom:30px;
}

.card{
    background:#f8f8f8;
    padding:20px;
    border-radius:12px;
    margin-bottom:25px;
}

.percentual{
    font-size:48px;
    color:#0d6efd;
    font-weight:bold;
}

.barra{
    width:100%;
    height:22px;
    background:#ddd;
    border-radius:30px;
    overflow:hidden;
    margin:15px 0;
}

.progresso{
    height:100%;
    background:#22c55e;
}
</style>

</head>
<body>

<div class="container">

<h1>📊 Painel de Metas</h1>

<div class="data" id="data"></div>

<div class="card">
<h2>🎯 Meta Mensal</h2>

<div class="percentual" id="mensal"></div>

<div class="barra">
<div class="progresso" id="barraMensal"></div>
</div>

<p id="textoMensal"></p>

</div>

<div class="card">

<h2>📈 Meta Trimestral</h2>

<div class="percentual" id="trimestral"></div>

<div class="barra">
<div class="progresso" id="barraTrimestral"></div>
</div>

<p id="textoTrimestral"></p>

</div>

</div>

<script>

fetch("dados.json")
.then(res=>res.json())
.then(dados=>{

document.getElementById("mensal").innerHTML=dados.metaMensal+"%";

document.getElementById("trimestral").innerHTML=dados.metaTrimestral+"%";

document.getElementById("barraMensal").style.width=dados.metaMensal+"%";

document.getElementById("barraTrimestral").style.width=dados.metaTrimestral+"%";

document.getElementById("textoMensal").innerHTML=
`Até o momento estamos com <b>${dados.metaMensal}%</b> da meta mensal concluída.`;

document.getElementById("textoTrimestral").innerHTML=
`No trimestre estamos com <b>${dados.metaTrimestral}%</b> da meta concluída.`;

const agora = new Date();

const dataFormatada = agora.toLocaleString("pt-BR", {
  day: "2-digit",
  month: "2-digit",
  year: "numeric",
  hour: "2-digit",
  minute: "2-digit"
});

document.getElementById("data").innerHTML =
`Atualizado em: ${dataFormatada}`;

});

</script>

</body>
</html>
